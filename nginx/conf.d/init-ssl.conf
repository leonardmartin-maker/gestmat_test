# Temporary config for obtaining SSL certificates
# Usage: rename this to default.conf, start nginx, run certbot, then restore default.conf

server {
    listen 80;
    server_name gestion-materiel.swissworktogether.ch api-gestion-materiel.swissworktogether.ch;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'SSL setup in progress';
        add_header Content-Type text/plain;
    }
}
