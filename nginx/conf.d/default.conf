# Frontend - gestion-materiel.swissworktogether.ch
server {
    listen 80;
    server_name gestion-materiel.swissworktogether.ch;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name gestion-materiel.swissworktogether.ch;

    ssl_certificate /etc/letsencrypt/live/gestion-materiel.swissworktogether.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gestion-materiel.swissworktogether.ch/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 10M;

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

