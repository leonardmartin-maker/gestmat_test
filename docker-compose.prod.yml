services:
  db:
    image: postgres:16
    container_name: gm-db
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal

  api:
    build: ./backend
    container_name: gm-api
    restart: unless-stopped
    env_file:
      - .env.prod
    depends_on:
      - db
    ports:
      - "127.0.0.1:8010:8000"
    command: >
      sh -c "alembic upgrade head
      && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    networks:
      - internal

  frontend:
    build:
      context: ./gestion-materiel-frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: https://api-gestion-materiel.swissworktogether.ch
    container_name: gm-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3010:3000"
    networks:
      - internal

volumes:
  pgdata:

networks:
  internal:
